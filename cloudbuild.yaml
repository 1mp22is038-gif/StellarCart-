steps:
  # ---------------------------------------------------------
  # 1. FRONTEND: Deploy static assets to GCS
  # ---------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy-Frontend-GCS'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Deploying Frontend to Cloud Storage bucket: ${_FRONTEND_BUCKET}"
        gsutil -m rsync -r -d ./Frontend gs://${_FRONTEND_BUCKET}

  # ---------------------------------------------------------
  # 2. BACKEND: Deploy via MIG Rolling Restart
  # ---------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy-Backend-MIG'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Triggering rolling restart for MIG: ${_MIG_NAME}"

        gcloud compute instance-groups managed rolling-action restart ${_MIG_NAME} \
          --region=${_REGION}

substitutions:
  _REGION: 'asia-south1'
  _MIG_NAME: 'steller-group'
  _FRONTEND_BUCKET: 'migrated-bucket-aws-gcp'

options:
  logging: CLOUD_LOGGING_ONLY
